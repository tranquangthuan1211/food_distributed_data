version: '3.8'
services:
  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - mongo
      - redis
      - cassandra
      - neo4j
    env_file: .env
    networks:
      - food-net
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27019:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - food-net

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    networks:
      - food-net

  cassandra:
    image: cassandra:4.1
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: FoodCluster
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - food-net
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
    networks:
      - food-net

volumes:
  mongo_data:
  cassandra_data:
  neo4j_data:

networks:
  food-net:
    driver: bridge
